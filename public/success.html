<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analysing your lease — LeaseCheck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Spectral:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #0F6E56;
    --accent-deep: #0A3D30;
    --accent-bright: #1D9E75;
    --accent-tint: #E4F1EA;
    --accent-tint-2: #F0F7F2;
    --ink: #15201B;
    --ink-soft: #2C3832;
    --muted: #5C665F;
    --paper: #F4F1E8;
    --paper-2: #FBF9F3;
    --white: #ffffff;
    --line: rgba(21,32,27,0.12);
    --line-soft: rgba(21,32,27,0.07);
    --red: #A32D2D; --red-bg: #FAE8E5;
    --amber: #8A5414; --amber-bg: #F6EBD6;
    --good: #0F6E56; --good-bg: #E1F2E9;
    --serif: 'Spectral', Georgia, serif;
    --sans: 'Hanken Grotesk', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
    --shadow-sm: 0 1px 2px rgba(21,32,27,.05), 0 2px 8px rgba(21,32,27,.05);
    --shadow-md: 0 4px 12px rgba(21,32,27,.06), 0 18px 40px rgba(21,32,27,.09);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--paper);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    background-image: radial-gradient(rgba(21,32,27,.018) 1px, transparent 1px);
    background-size: 4px 4px;
    opacity: .6;
  }

  .card {
    background: var(--white);
    border-radius: 20px;
    border: 1px solid var(--line);
    padding: 2.5rem;
    max-width: 720px;
    width: 100%;
    box-shadow: var(--shadow-md);
    position: relative;
    z-index: 1;
  }

  h1 { font-family: var(--serif); font-weight: 500; font-size: 1.75rem; margin-bottom: .75rem; letter-spacing: -0.01em; }
  .sub { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 1.5rem; }

  .spinner-wrap { display: flex; align-items: center; gap: 12px; padding: 1rem 0; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-text { font-family: var(--mono); font-size: 13px; color: var(--muted); }

  #report { margin-top: 1.5rem; }

  .risk-header { border-radius: 14px; padding: 1.25rem; margin-bottom: 1.25rem; }
  .risk-red { background: var(--red-bg); }
  .risk-amber { background: var(--amber-bg); }
  .risk-green { background: var(--good-bg); }
  .risk-label { font-family: var(--mono); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  .risk-label-red { color: var(--red); }
  .risk-label-amber { color: var(--amber); }
  .risk-label-green { color: var(--good); }
  .verdict { font-family: var(--serif); font-size: 16px; font-weight: 500; color: var(--ink); margin-bottom: 6px; }
  .summary-text { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .section-lbl { font-family: var(--mono); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin: 1.5rem 0 .75rem; }

  .clause { border: 1px solid var(--line-soft); border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 8px; }
  .clause-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .clause-name { font-size: 14px; font-weight: 600; }
  .pill { font-family: var(--mono); font-size: 10.5px; font-weight: 500; padding: 3px 10px; border-radius: 6px; letter-spacing: .03em; text-transform: uppercase; }
  .pill-red { background: var(--red-bg); color: var(--red); }
  .pill-amber { background: var(--amber-bg); color: var(--amber); }
  .pill-green { background: var(--good-bg); color: var(--good); }
  .clause-plain { font-size: 13px; color: var(--ink-soft); line-height: 1.55; margin-bottom: 6px; }
  .clause-rra { font-size: 12px; color: var(--red); background: var(--red-bg); padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; line-height: 1.5; }
  .clause-action { font-size: 12px; color: var(--good); background: var(--good-bg); padding: 8px 12px; border-radius: 8px; line-height: 1.5; }

  .action-list { list-style: none; }
  .action-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line-soft); font-size: 14px; line-height: 1.5; }
  .action-item:last-child { border-bottom: none; }
  .action-num { font-weight: 600; color: var(--accent); flex-shrink: 0; }

  .disclaimer { font-size: 11px; color: var(--muted); line-height: 1.6; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--line-soft); }

  .error-box { background: var(--red-bg); border-radius: 14px; padding: 1.25rem; color: var(--red); font-size: 14px; line-height: 1.6; }

  .download-bar { display: flex; gap: 10px; margin-bottom: 1.5rem; }
  .dl-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: var(--sans);
    transition: opacity .15s, transform .1s; border: none; text-decoration: none;
  }
  .dl-btn:hover { opacity: .85; }
  .dl-btn:active { transform: scale(.98); }
  .dl-primary { background: var(--ink); color: var(--paper-2); }
  .dl-secondary { background: transparent; color: var(--ink); border: 1px solid var(--line); }

  .upload-again { display: inline-block; margin-top: 1rem; padding: 10px 20px; background: var(--ink); color: var(--paper-2); border-radius: 10px; font-size: 14px; font-weight: 600; text-decoration: none; }

  .upload-zone {
    border: 1.6px dashed rgba(15,110,86,.32);
    border-radius: 14px; padding: 2rem; text-align: center;
    cursor: pointer; background: var(--accent-tint-2);
    margin-bottom: 1rem;
    transition: border-color .18s, background .18s;
  }
  .upload-zone:hover { border-color: var(--accent); background: var(--accent-tint); }
  .upload-zone-label { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .upload-zone-sub { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  input[type="file"] { display: none; }
  .file-name { font-family: var(--mono); font-size: 13px; color: var(--accent); margin-bottom: 1rem; display: none; font-weight: 500; }
  .analyse-btn {
    width: 100%; padding: 14px; background: var(--ink); color: var(--paper-2);
    border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: var(--sans); transition: opacity .15s;
  }
  .analyse-btn:hover { opacity: .85; }
  .analyse-btn:disabled { opacity: .35; cursor: not-allowed; }

  .free-badge {
    display: inline-block; font-family: var(--mono); font-size: 11px;
    background: var(--accent-tint); color: var(--accent);
    padding: 4px 10px; border-radius: 100px; margin-bottom: 12px;
    letter-spacing: .04em; font-weight: 500; text-transform: uppercase;
  }

  .upsell-bar {
    margin-top: 1.5rem; padding: 16px 20px;
    background: var(--accent-tint); border-radius: 12px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
  .upsell-text { font-size: 14px; color: var(--accent-deep); font-weight: 500; }
  .upsell-btn {
    padding: 10px 20px; background: var(--accent); color: #fff;
    border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: var(--sans); text-decoration: none;
    transition: opacity .15s;
  }
  .upsell-btn:hover { opacity: .85; }

  .back-link { display: inline-block; margin-top: 1rem; font-size: 13px; color: var(--muted); text-decoration: underline; text-underline-offset: 3px; }

  @media print {
    body { padding: 0; background: #fff; }
    .card { box-shadow: none; border: none; padding: 0; max-width: 100%; }
    .download-bar, .upsell-bar, .back-link { display: none !important; }
  }
</style>
</head>
<body>

<div class="card">
  <div id="uploadStep">
    <h1>Payment confirmed</h1>
    <p class="sub">Now upload your tenancy agreement to get your report.</p>
    <div class="upload-zone" id="zone">
      <div class="upload-zone-label">Drop your PDF here or click to upload</div>
      <div class="upload-zone-sub">PDF only · Max 20MB · Never stored</div>
      <input type="file" id="fileInput" accept=".pdf">
    </div>
    <div class="file-name" id="fileName"></div>
    <button class="analyse-btn" id="analyseBtn" disabled>Analyse my lease</button>
  </div>

  <div id="loadingStep" style="display:none">
    <h1>Analysing your lease</h1>
    <p class="sub">Checking every clause against the Renters' Rights Act 2025. This takes about 30 seconds.</p>
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <span class="status-text" id="statusText">Reading your document...</span>
    </div>
  </div>

  <div id="reportStep" style="display:none">
    <div id="report"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('session_id');
  const tier = params.get('tier');
  const isFree = tier === 'free';

  if (!token && !isFree) {
    document.getElementById('uploadStep').innerHTML = '<div class="error-box">No payment found. <a href="/" style="color:inherit;font-weight:600">Go back and try again.</a></div>';
  }

  if (isFree) {
    document.querySelector('#uploadStep h1').textContent = 'Free scan';
    document.querySelector('#uploadStep .sub').textContent = 'Upload your tenancy agreement for a quick red-flag check (top 3 issues only).';
    const badge = document.createElement('div');
    badge.className = 'free-badge';
    badge.textContent = 'Free tier — 3 flags only';
    document.getElementById('uploadStep').insertBefore(badge, document.querySelector('#uploadStep h1'));
  }

  const zone = document.getElementById('zone');
  const fileInput = document.getElementById('fileInput');
  const analyseBtn = document.getElementById('analyseBtn');
  const fileNameEl = document.getElementById('fileName');
  let selectedFile = null;
  let pdfBase64 = null;

  // Check if PDF was stored from index.html before payment
  const storedBase64 = sessionStorage.getItem('lc_pdf_base64');
  const storedName = sessionStorage.getItem('lc_pdf_name');

  if (storedBase64 && storedName) {
    pdfBase64 = storedBase64;
    fileNameEl.textContent = storedName;
    fileNameEl.style.display = 'block';
    analyseBtn.disabled = false;
    document.querySelector('#uploadStep h1').textContent = isFree ? 'Free scan' : 'Ready to analyse';
    document.querySelector('#uploadStep .sub').textContent = 'Your file is ready. Click below to get your report.';
    sessionStorage.removeItem('lc_pdf_base64');
    sessionStorage.removeItem('lc_pdf_name');
  }

  zone.addEventListener('click', () => fileInput.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = 'var(--accent)'; zone.style.background = 'var(--accent-tint)'; });
  zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; zone.style.background = ''; });
  zone.addEventListener('drop', e => { e.preventDefault(); zone.style.borderColor = ''; zone.style.background = ''; if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

  function handleFile(f) {
    if (!f.name.endsWith('.pdf')) { alert('Please upload a PDF file.'); return; }
    if (f.size > 20 * 1024 * 1024) { alert('File too large. Max 20MB.'); return; }
    selectedFile = f;
    pdfBase64 = null;
    fileNameEl.textContent = f.name;
    fileNameEl.style.display = 'block';
    analyseBtn.disabled = false;
  }

  const statusMessages = [
    'Reading your document...',
    'Identifying clause types...',
    'Checking against the Renters Rights Act 2025...',
    'Flagging Section 21 references...',
    'Assessing rent increase clauses...',
    'Building your report...'
  ];

  analyseBtn.addEventListener('click', async () => {
    if (!pdfBase64 && !selectedFile) return;
    if (!token && !isFree) return;

    document.getElementById('uploadStep').style.display = 'none';
    document.getElementById('loadingStep').style.display = 'block';

    let i = 0;
    const statusEl = document.getElementById('statusText');
    const interval = setInterval(() => {
      i = (i + 1) % statusMessages.length;
      statusEl.textContent = statusMessages[i];
    }, 4000);

    // Convert PDF to base64 if not already stored
    if (!pdfBase64 && selectedFile) {
      pdfBase64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = () => rej(new Error('Failed to read file'));
        r.readAsDataURL(selectedFile);
      });
    }

    try {
      const body = isFree
        ? { pdfBase64, tier: 'free' }
        : { token, pdfBase64 };

      const response = await fetch('/api/analyse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      clearInterval(interval);
      const data = await response.json();

      if (!data.success) throw new Error(data.error || 'Analysis failed');

      renderReport(data.report, isFree);
    } catch (err) {
      clearInterval(interval);
      document.getElementById('loadingStep').style.display = 'none';
      document.getElementById('reportStep').style.display = 'block';
      document.getElementById('report').innerHTML = `
        <div class="error-box">
          <strong>Something went wrong.</strong><br>${err.message}<br>
          <a href="mailto:support@leasecheck.co.uk" class="upload-again">Contact support</a>
        </div>`;
    }
  });

  // Auto-start analysis if PDF was pre-stored
  if (pdfBase64 && (token || isFree)) {
    analyseBtn.click();
  }

  function renderReport(r, free) {
    document.getElementById('loadingStep').style.display = 'none';
    document.getElementById('reportStep').style.display = 'block';

    const riskClass = { red: 'risk-red', amber: 'risk-amber', green: 'risk-green' };
    const riskLabelClass = { red: 'risk-label-red', amber: 'risk-label-amber', green: 'risk-label-green' };
    const riskText = { red: 'High risk', amber: 'Review needed', green: 'Compliant' };
    const pillClass = { red: 'pill-red', amber: 'pill-amber', green: 'pill-green' };

    const clauses = free ? (r.clauses || []).slice(0, 3) : (r.clauses || []);

    const clausesHtml = clauses.map(c => `
      <div class="clause">
        <div class="clause-top">
          <span class="clause-name">${c.name}</span>
          <span class="pill ${pillClass[c.risk]}">${riskText[c.risk]}</span>
        </div>
        <div class="clause-plain">${c.plain_english}</div>
        ${c.rra_issue ? `<div class="clause-rra">RRA 2025: ${c.rra_issue}</div>` : ''}
        <div class="clause-action">→ ${c.what_to_do}</div>
      </div>`).join('');

    const actionsHtml = free ? '' : (r.top_3_actions || []).map((a, i) => `
      <li class="action-item"><span class="action-num">${i + 1}.</span><span>${a}</span></li>`).join('');

    const negotiateHtml = (!free && r.negotiate_these?.length) ? `
      <div class="section-lbl">Negotiate these</div>
      ${r.negotiate_these.map(n => `
        <div class="clause">
          <div class="clause-name" style="margin-bottom:4px">${n.clause}</div>
          <div class="clause-plain" style="font-style:italic">“${n.suggested_wording}”</div>
        </div>`).join('')}` : '';

    const downloadBar = free ? '' : `
      <div class="download-bar">
        <button class="dl-btn dl-primary" onclick="downloadPDF()">
          <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF report
        </button>
        <button class="dl-btn dl-secondary" onclick="window.print()">
          <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print
        </button>
      </div>`;

    const upsellHtml = free ? `
      <div class="upsell-bar">
        <div class="upsell-text">Want the full clause-by-clause report + PDF download?</div>
        <a href="https://buy.stripe.com/test_8x26oG43Acs5g5GdYi1gs01" class="upsell-btn">Get full report — £9.99</a>
      </div>` : '';

    document.getElementById('report').innerHTML = `
      ${downloadBar}
      <div id="reportContent">
        <div class="risk-header ${riskClass[r.overall_risk]}">
          <div class="risk-label ${riskLabelClass[r.overall_risk]}">Overall — ${riskText[r.overall_risk]}</div>
          <div class="verdict">${r.rra_compliance_verdict}</div>
          <div class="summary-text">${r.summary || ''}</div>
        </div>
        <div class="section-lbl">${free ? 'Top flags (3 of ' + (r.clauses || []).length + ')' : 'Clause by clause'}</div>
        ${clausesHtml}
        ${actionsHtml ? `<div class="section-lbl">Your top 3 actions</div><ul class="action-list">${actionsHtml}</ul>` : ''}
        ${negotiateHtml}
        <div class="disclaimer">${r.disclaimer || 'This report is for informational purposes only and does not constitute legal advice.'}</div>
      </div>
      ${upsellHtml}
      <a href="/" class="back-link">← Back to LeaseCheck</a>`;

    window._leaseReport = r;
  }

  function downloadPDF() {
    const el = document.getElementById('reportContent');
    if (!el) return;

    const opt = {
      margin: [12, 14, 16, 14],
      filename: 'LeaseCheck-Report.pdf',
      image: { type: 'jpeg', quality: 0.96 },
      html2canvas: { scale: 2, useCORS: true, letterRendering: true },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    };

    html2pdf().set(opt).from(el).save();
  }
</script>
</body>
</html>
